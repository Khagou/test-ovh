stages:
  - validate
  - plan
  - infra
  - docker
  - deploy

# Secrets à définir dans GitLab → Settings → CI/CD → Variables :
#   OVH_CLIENT_ID, OVH_CLIENT_SECRET, OVH_SERVICE_NAME (non masquables)
#   OVH_S3_ACCESS_KEY, OVH_S3_SECRET_KEY              (masquables)
variables:
  TF_VAR_ovh_client_id:     $OVH_CLIENT_ID
  TF_VAR_ovh_client_secret: $OVH_CLIENT_SECRET
  TF_VAR_service_name:      $OVH_SERVICE_NAME
  AWS_ACCESS_KEY_ID:        $OVH_S3_ACCESS_KEY
  AWS_SECRET_ACCESS_KEY:    $OVH_S3_SECRET_KEY

# L'image hashicorp/terraform a ENTRYPOINT=terraform → GitLab CI ne peut pas
# lancer /bin/sh. entrypoint: [""] rétablit le shell standard.
.terraform-image: &terraform-image
  name: hashicorp/terraform:latest
  entrypoint: [""]

# ─── VALIDATE (toutes les branches) ───────────────────────────────────────────

terraform-validate:
  stage: validate
  image: *terraform-image
  script:
    - terraform init
    - terraform fmt -check
    - terraform validate

# ─── PLAN (toutes les branches) ───────────────────────────────────────────────
# Sur dev  → preview de ce qui serait créé/modifié, rien n'est appliqué.
# Sur main → preview avant l'apply automatique (stages suivants).
# -target évite d'appeler le provider Kubernetes avant que le cluster existe.

terraform-plan:
  stage: plan
  image: *terraform-image
  script:
    - terraform init
    - |
      terraform plan -no-color \
        -target=module.network \
        -target=module.kubernetes \
        -target=module.registry \
        -target=module.database

# ─── INFRA (main uniquement) ──────────────────────────────────────────────────
# Crée le réseau, le cluster Kubernetes, le registry et la BDD.

terraform-infra:
  stage: infra
  image: *terraform-image
  script:
    - terraform init
    - |
      terraform plan -no-color -out=tfplan \
        -target=module.network \
        -target=module.kubernetes \
        -target=module.registry \
        -target=module.database
    - terraform apply -no-color -auto-approve tfplan
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ─── DOCKER (main uniquement) ─────────────────────────────────────────────────
# Lit les credentials du registry via terraform output, build et push l'image.

docker-build:
  stage: docker
  image: *terraform-image
  services:
    - name: docker:dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: /certs
    DOCKER_TLS_VERIFY: "1"
    DOCKER_CERT_PATH: /certs/client
  before_script:
    - apk add --no-cache docker-cli
    - terraform init
  script:
    - |
      REGISTRY_URL=$(terraform output -raw registry_url)
      REGISTRY_HOST="${REGISTRY_URL#https://}"
      REGISTRY_HOST="${REGISTRY_HOST#http://}"
      REGISTRY_USER=$(terraform output -raw registry_login)
      REGISTRY_PASSWORD=$(terraform output -raw registry_password)
      echo "$REGISTRY_PASSWORD" | docker login "$REGISTRY_HOST" -u "$REGISTRY_USER" --password-stdin
      docker build -t "$REGISTRY_HOST/library/myapp:latest" .
      docker push "$REGISTRY_HOST/library/myapp:latest"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ─── DEPLOY (main uniquement) ─────────────────────────────────────────────────
# Déploie l'application sur Kubernetes. Cluster créé (infra) + image dispo (docker).

terraform-deploy:
  stage: deploy
  image: *terraform-image
  script:
    - terraform init
    - terraform plan -no-color -out=tfplan
    - terraform apply -no-color -auto-approve tfplan
    - terraform output -raw app_url
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
