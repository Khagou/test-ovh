name: DevOps Pipeline

on:
  workflow_dispatch:
    inputs:
      env:
        description: "Environnement cible"
        required: true
        type: choice
        options:
          - dev
          - prd
      action:
        description: "Action Terraform"
        required: true
        type: choice
        options:
          - plan
          - apply
        default: plan

env:
  TF_VAR_ovh_client_id: ${{ secrets.OVH_CLIENT_ID }}
  TF_VAR_ovh_client_secret: ${{ secrets.OVH_CLIENT_SECRET }}
  TF_VAR_service_name: ${{ secrets.OVH_SERVICE_NAME }}
  TF_VAR_env: ${{ inputs.env }}
  AWS_ACCESS_KEY_ID: ${{ secrets.OVH_S3_ACCESS_KEY }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.OVH_S3_SECRET_KEY }}

jobs:

  # ──────────────────────────────────────────────────────────────────────────
  # Job 1 : Crée le réseau, le cluster Kubernetes, le registry et la BDD.
  # Utilise -target pour ne pas déclencher le provider Kubernetes avant que
  # le cluster existe (kubeconfig inconnu lors du premier plan).
  # ──────────────────────────────────────────────────────────────────────────
  terraform-infra:
    name: "Terraform – Infrastructure (${{ inputs.env }})"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init -backend-config="key=ovh/${{ inputs.env }}/terraform.tfstate"

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan (infra uniquement)
        run: |
          terraform plan -no-color -out=tfplan \
            -target=module.network \
            -target=module.kubernetes \
            -target=module.registry \
            -target=module.database

      - name: Terraform Apply (infra uniquement)
        if: inputs.action == 'apply'
        run: terraform apply -no-color -auto-approve tfplan

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2 : Build l'image Docker et la pousse dans le registry OVH.
  # Lit les credentials directement via terraform output (backend S3 partagé).
  # ──────────────────────────────────────────────────────────────────────────
  docker:
    name: "Docker – Build & Push (${{ inputs.env }})"
    runs-on: ubuntu-latest
    needs: terraform-infra
    if: inputs.action == 'apply'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init -backend-config="key=ovh/${{ inputs.env }}/terraform.tfstate"

      - name: Lire les outputs du registry
        id: registry
        run: |
          REGISTRY_URL=$(terraform output -raw registry_url)
          REGISTRY_HOST="${REGISTRY_URL#https://}"
          REGISTRY_HOST="${REGISTRY_HOST#http://}"
          REGISTRY_USER=$(terraform output -raw registry_login)
          REGISTRY_PASSWORD=$(terraform output -raw registry_password)
          echo "::add-mask::$REGISTRY_PASSWORD"
          echo "host=$REGISTRY_HOST"         >> "$GITHUB_OUTPUT"
          echo "user=$REGISTRY_USER"         >> "$GITHUB_OUTPUT"
          echo "password=$REGISTRY_PASSWORD" >> "$GITHUB_OUTPUT"

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.registry.outputs.host }}
          username: ${{ steps.registry.outputs.user }}
          password: ${{ steps.registry.outputs.password }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.registry.outputs.host }}/library/myapp:latest

  # ──────────────────────────────────────────────────────────────────────────
  # Job 3 : Déploie l'application sur Kubernetes via le provider Terraform.
  # Le cluster est maintenant créé (job 1) et l'image disponible (job 2).
  # ──────────────────────────────────────────────────────────────────────────
  terraform-app:
    name: "Terraform – App Deployment (${{ inputs.env }})"
    runs-on: ubuntu-latest
    needs: docker
    if: inputs.action == 'apply'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init -backend-config="key=ovh/${{ inputs.env }}/terraform.tfstate"

      - name: Terraform Plan (déploiement app)
        run: terraform plan -no-color -out=tfplan

      - name: Terraform Apply (déploiement app)
        run: terraform apply -no-color -auto-approve tfplan

      - name: Afficher l'URL de l'application
        run: terraform output -raw app_url
