name: Terraform

on:
  push:
  pull_request:
    branches: [main]

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest

    env:
      # Credentials OVH OAuth2 (service account IAM)
      TF_VAR_ovh_client_id: ${{ secrets.OVH_CLIENT_ID }}
      TF_VAR_ovh_client_secret: ${{ secrets.OVH_CLIENT_SECRET }}
      TF_VAR_service_name: ${{ secrets.OVH_SERVICE_NAME }}
      # Credentials S3 pour le backend tfstate
      AWS_ACCESS_KEY_ID: ${{ secrets.OVH_S3_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.OVH_S3_SECRET_KEY }}

    steps:
      - name: 
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -no-color -out=tfplan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -no-color -auto-approve tfplan
